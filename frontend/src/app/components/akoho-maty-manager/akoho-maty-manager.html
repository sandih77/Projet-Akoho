<div class="akoho-maty-manager">
  <h2>Gestion de la Mortalité (Akoho Maty)</h2>
  
  <div class="form-section">
    <h3>Ajouter une mortalité</h3>
    <app-akoho-maty-form (akohoMatyCreated)="onAkohoMatyCreated()"></app-akoho-maty-form>
  </div>

  <div class="list-section">
    <h3>Liste des mortalités</h3>
    <p *ngIf="message" class="success-message">{{ message }}</p>
    
    <table *ngIf="akohoMatyList.length > 0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Lot</th>
          <th>Date de mort</th>
          <th>Nombre de morts</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let akohoMaty of akohoMatyList">
          <td>{{ akohoMaty.id }}</td>
          <td>{{ akohoMaty.lot_nom }}</td>
          <td>{{ akohoMaty.date_maty | date:'dd/MM/yyyy' }}</td>
          <td>{{ akohoMaty.nombre }}</td>
        </tr>
      </tbody>
    </table>
    
    <p *ngIf="akohoMatyList.length === 0" class="no-data">Aucune mortalité enregistrée.</p>
  </div>
</div>

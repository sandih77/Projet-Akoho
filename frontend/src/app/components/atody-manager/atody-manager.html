<div class="atody-manager">
  <h2>Gestion de la Production d'Œufs (Atody)</h2>
  
  <div class="form-section">
    <h3>Ajouter une production</h3>
    <app-atody-form (atodyCreated)="onAtodyCreated()"></app-atody-form>
  </div>

  <div class="list-section">
    <h3>Liste des productions</h3>
    <p *ngIf="message" class="success-message">{{ message }}</p>
    
    <table *ngIf="atodyList.length > 0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Lot</th>
          <th>Date de production</th>
          <th>Nombre d'œufs</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let atody of atodyList">
          <td>{{ atody.id }}</td>
          <td>{{ atody.lot_nom }}</td>
          <td>{{ atody.date_production | date:'dd/MM/yyyy' }}</td>
          <td>{{ atody.nombre_atody }}</td>
        </tr>
      </tbody>
    </table>
    
    <p *ngIf="atodyList.length === 0" class="no-data">Aucune production enregistrée.</p>
  </div>
</div>

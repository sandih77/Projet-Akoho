<div *ngIf="errorMessage" class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> {{ errorMessage }}</div>
<div *ngIf="successMessage" class="alert alert-success"><i class="fas fa-check-circle"></i> {{ successMessage }}</div>

<form [formGroup]="eclosionForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
        <label class="form-label" for="lot">Lot mère</label>
        <select class="form-control" id="lot" formControlName="lot_id">
            <option [value]="0" disabled>Choisir un lot</option>
            <option *ngFor="let lot of lots" [value]="lot.id">{{ lot.name }} ({{ lot.race_nom }})</option>
        </select>
    </div>

    <div class="form-group">
        <label class="form-label" for="date_eclosion">Date d'éclosion</label>
        <input class="form-control" id="date_eclosion" formControlName="date_eclosion" type="date" />
    </div>

    <div class="form-group">
        <label class="form-label" for="nombre_foy">Nombre de poussins éclos</label>
        <input class="form-control" id="nombre_foy" formControlName="nombre_foy" type="number" />
    </div>

    <div class="form-group">
        <label class="form-label" for="nombre_tsy_foy">Nombre akoho tsy foy</label>
        <input class="form-control" id="nombre_tsy_foy" formControlName="nombre_tsy_foy" type="number" />
    </div>

    <button class="btn btn-primary" type="submit">
        <i class="fas fa-save"></i> Enregistrer
    </button>
</form>
